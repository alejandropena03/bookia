services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      TZ: America/Bogota
      DATABASE_URL: postgres://bookia:bookia_pass@postgres:5432/bookia
      DATABASE_URL_APP: postgres://bookia_app:bookia_app_pass@postgres:5432/bookia
      NODE_ENV: production
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookia
      POSTGRES_PASSWORD: bookia_pass
      POSTGRES_DB: bookia
    ports:
      - "5432:5432"
    volumes:
      - bookia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookia -d bookia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  bookia_pgdata:
    name: bookia_pgdata
    external: true
